# Cole este YAML no serviço Compose do Easypanel e rode.
# O app usa uma IMAGEM pronta (GHCR), buildada pelo GitHub Actions — não precisa
# de código-fonte no Easypanel.
# PRÉ-REQUISITO: a imagem do GHCR precisa estar PÚBLICA (uma vez, no GitHub:
#   Packages -> certificacao-anthropic -> Package settings -> Change visibility -> Public)
# Definir JWT_SECRET e POSTGRES_PASSWORD nas Environment Variables do serviço.
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: certificacao
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    image: ghcr.io/rafaelgonnect/certificacao-anthropic:latest
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/certificacao?schema=public
      JWT_SECRET: ${JWT_SECRET:-troque-isto}
      PORT: 3001
    ports:
      - "3001:3001"

volumes:
  pgdata:
