# Compose de deploy no Easypanel — basta COLAR este YAML no serviço Compose e rodar.
# A imagem do app é buildada no GitHub Actions e publicada no GHCR (não precisa de
# código-fonte no Easypanel). Definir JWT_SECRET e POSTGRES_PASSWORD nas
# Environment Variables do serviço. Se a imagem do GHCR for privada, configurar as
# credenciais do registry no Easypanel (ou tornar o package público).
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-certificacao}
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    image: ghcr.io/rafaelgonnect/certificacao-anthropic:latest
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-certificacao}?schema=public
      JWT_SECRET: ${JWT_SECRET:-change-me-in-easypanel}
      PORT: 3001
    ports:
      - "3001:3001"

volumes:
  pgdata:
