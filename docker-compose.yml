services:
  postgres:
    image: postgres:16-alpine
    container_name: certificacao-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: certificacao
    ports:
      - "5432:5432"
    volumes:
      - certificacao_pgdata:/var/lib/postgresql/data

volumes:
  certificacao_pgdata:
